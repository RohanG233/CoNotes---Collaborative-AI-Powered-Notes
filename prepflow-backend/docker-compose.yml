version: '3.9'

services:
  gateway:
    build: ./gateway
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL}
      AUTH_SERVICE_URL: http://auth-service:3001
      NOTES_SERVICE_URL: http://notes-service:3002
      AI_SERVICE_URL: http://ai-service:3003
    depends_on:
      auth-service:
        condition: service_healthy
      notes-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth-service:
    build: ./auth-service
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notes-service:
    build: ./notes-service
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ai-service:
    build: ./ai-service
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      CLIENT_URL: ${CLIENT_URL}
      AI_RATE_LIMIT_MAX: ${AI_RATE_LIMIT_MAX:-10}
      AI_RATE_LIMIT_WINDOW_MS: ${AI_RATE_LIMIT_WINDOW_MS:-3600000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
